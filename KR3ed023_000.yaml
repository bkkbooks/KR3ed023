藥再入桕內杵一千杵丸如梧桐子大每服三十丸空心鹽酒送下服百日永不泄如要通即以冷水調車前子末半合服之如欲祕再服之忌葵菜灸勞病方從下數至第三根短肋稍尖上灸二七壯炷男左女右又於項後數下至第三脊溝點穴灸隨病人年紀十歲即灸十炷王千戶家傳甚效雞清丸治男子婦人精滑下元虛冷及疝氣證婦人經脈不調大人小兒皆可服川獨活穀精草續斷茵陳上為細末雞清為丸如梧桐子大每服五十丸空心溫酒送下乾物壓之葫蘆巴丸治虛損不可醫之疾極能關鎖精氣升降陰陽功效如神附子炮一兩去皮川烏炮去黑皮沉香酸棗仁湯泡去皮當歸去蘆川芎柏子仁去殼葫蘆巴巴戟去心破故紙微炒龍骨牡蠣煅天雄炮赤石脂以上各一兩煅鹿茸二兩酥炙茴香二兩澤瀉半兩生硫黃明者七錢半生用上為細末酒糊為丸如梧桐子大每服五十丸空心鹽湯米飲送下日進二服陳橘皮丸治虛勞堅癖腹脹羸瘦食久不消面色萎黃四肢少力陳橘皮湯浸去白炒木香厚朴去粗皮薑汁浸硫黃細研大黃銼炒檳榔生銼以上各一兩上六味搗羅為末煉蜜為丸如梧桐子大每服二十丸溫酒或米飲送下八寶丹壯益元陽行氣生血廣木香母丁香紅花各二兩牡蠣五錢地龍去土五錢燈草二錢糨曬乾研干胭脂二兩半穿山甲十五片炮上為末甘草三兩碾末熬成膏子丸如彈子大每服一丸細嚼空心酒下以乾物壓之用水丸桐子大每服五十丸溫酒送下亦可還少丹昔日越王曾遇異人得此方極能固齒牙壯筋骨生腎水凡年未及八十者服之鬚髮返黑齒落更生年少服之至老不衰得遇此者宿有仙緣當珍重之不可輕泄用蒲公英一斤一名耩耨草又名蒲公罌生平澤中三四月甚有之秋後亦有放花者連根帶葉取一斤洗淨勿令見天日晾乾入斗子解鹽一兩香附子五錢二味為細末入蒲公草內淹一宿分為二十團用皮紙三四層裹扎定用六一泥即蚯蚓糞如法固濟入灶內焙乾乃以武火煅通紅為度冷定取出去泥為末早晚擦牙漱之吐咽任便久久方效八瀉痢門木香湯治赤白痢久不瘥黃連木香乾薑各一分乳香半兩上四味為細末每服二錢空心用米飲湯調服大有效驗香連丸治赤白痢木香一兩一半生用一半糯米炒米黃為度去米不用黃連一兩一半生用一半用茱萸炒黃色不用茱萸上為細末米粉或粟米飯為丸如梧桐子大每服三十丸空心米飲湯送下神效雞清丸治一切瀉痢木香二兩黃連二兩半肉豆蔻十個大者上三味先為細末取雞子清搜藥作餅子於慢火上炙令黃色變紅者稍干再為末麵糊為丸如梧桐子大每服五十丸空心米飲湯下固腸丸治瀉痢及泄瀉史橘齊家傳肉豆蔻麵裹煨龍骨煅研水飛阿膠蛤粉炒赤石脂煅七次醋淬研附子炮乾薑炮製木香濕紙裹煨人參去蘆以上各一兩沉香半兩鎊不見火白朮二兩炒訶子去核二兩上為細末粳米糊為丸如梧桐子大每服七八十丸空心米飲湯送下服藥後覺熱去附子加茱萸一兩黃連一兩椒紅固腸丸治脾胃積冷腸鳴大便滑泄腹痛神麯六兩銼作小塊炒香熟白朮一兩銼炒乾川薑去皮炮干三兩川椒去目炒去汗取紅淨一兩半厚朴去粗皮薑製一兩肉豆蔻三兩麵裹煨上為細末別用蒜不拘多少濕紙裹煨香熟剝淨研如泥熟湯化開濾去滓少入面打糊搜藥為丸如梧桐子大每服七八十丸空心米飲湯送下日進二服紅豆丸治臟腑泄瀉名為飧泄麥糵炒半夏湯泡七次砂仁神麯炒各一兩半硇砂醋化甘草青皮去穰陳皮去白鬱金紅豆藿香棠球蓬朮各一兩煨良薑蓽茇各二兩丁香半兩不見火上為細末水煮麵糊為丸如梧桐子大每服一百丸米飲或隨物空心送下病甚者日進三服白朮調中丸治脾胃不和心下堅痞兩脅脹滿臍腹疼痛噫宿腐氣霍亂吐瀉米穀不消久痢赤白膿血相雜多日羸瘦不思飲食神麯四兩炒白朮半兩人參去蘆白茯苓去皮豬苓去黑皮澤瀉各三錢木香二錢官桂一錢半去粗皮乾薑炮甘草去皮炙各一兩上為細末麵糊為丸如梧桐子大每服五七十丸空心淡薑湯送下神應丸治水瀉食瀉積瀉赤白痢休息痢無問遠年日近並皆治之黃連二兩一半生用一半熟用炒吳茱萸淨二兩罌粟殼二兩去筋末十分炒黑黃色木香二兩俱要用心稱足上為細末用陳倉米粉同好米醋打糊為丸如梧桐子大每服五七十丸空心米飲湯送下乳豆丸治臟腑泄瀉不調詹教授傳乳香二兩另研肉豆蔻麵裹煨熟取豆蔻切碎為末上為細末相和用陳米粉糊為丸如梧桐子大每服五七十丸空心米飲湯送下二神丸治脾腎泄瀉不止程裕卿推官傳破故紙半斤炒肉豆蔻四兩生上為細末用肥棗取肉研膏和藥杵丸如梧桐子大每服五七十丸空心用米飲湯送下二神丸論加木香二兩名木香三神丸孫真人云補腎不若補脾許學士云補脾不若補腎蓋腎氣怯弱則真陽衰劣不能蒸脾胃脾胃多寒令人胸膈痞塞不進飲食遲於運化或腹脅虛脹或嘔吐痰涎或腸鳴泄瀉譬如鼎釜之中有諸米穀無火力雖終日不熟其何能化用破故紙則補腎用肉豆蔻則補脾愚見之二藥雖兼補脾腎但無斡旋往往常加木香以順其氣使之斡旋空虛倉廩倉廩空虛則受物屢用見效加至百丸空心米飲湯入鹽少許送下五味子散專治白瀉不止五味子二兩吳茱萸五錢細粒緑色者佳上二味同炒香熟碾為細末每服三錢陳粟米飲湯空心臨臥調服日進二服至三日臟腑微痢至七日痊愈九頭面口眼耳鼻門盞落湯治偏正頭疼頭風麻黃去根節七錢半人參去蘆五錢陳皮去白七錢甘草去皮八錢御米殼去隔穰頂蒂三錢蜜炒黃上為㕮咀每服五錢生薑七片煎至七分去滓溫服食遠服下真珠散治偏正頭痛頭風盆硝七錢半研白滑石一兩研乳香一錢半