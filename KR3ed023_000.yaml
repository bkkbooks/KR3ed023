日以此二方授直廳醫者救欲死者數人凡居官者不可無此二方極效天南星防風上等分為細末破傷風以藥敷貼瘡口然後用藥一錢溫酒調下如牙關緊角弓反張用藥二錢童子小便調下或因鬥毆相打內有傷損以藥一錢溫酒調下打傷至死但心頭微溫以童子小便調二錢灌下連進三服天南星為防風所制服之不麻續再有一方亦妙追出黃水盡為效一日一次換又方亦張叔潛知府得之朝醫李子厚黃臘一塊用熱酒化開服立效與前治破傷風玉真散一對連用解毒散治毒蛇射工沙蝨等傷著人眼黑口噤手足直強毒氣入腹白礬研甘草各等分上為細末每服二錢冷水調下丁香散治反胃吐食水不能停黑錫一錢半又名黑鉛水銀一錢半二件一處於慢火上結沙子為細末丁香三錢桂一錢舶上硫黃五錢上為細末用小黃米湯調每服三錢再用生薑自然汁三錢調一處空心服之千轉丹治反胃吐食等病牛涎半斤好蜜半斤木鱉子三十個去皮油上為細末牛涎蜜一處於銀器內用慢火熬用槐條七枝攪之煨乾為度每和白粥兩匙日進三服急救仙方專治反胃反胃之病十有九死非藥不效良因輒強以食先飲以羹湯是速其吐今得其說不強以食絶其羹湯先投來復丹暑藥知其非伏暑證遂投養正靈砂之類飢則以飯炒香干啖之不與一點湯水三日後竟不復吐飲食如初再治方用又方好甘蔗搗汁七升生薑汁一升打和分作三服又方紅棗子一個去核裹全斑蝥一個用文武火煨畢去蝥用棗空心服之白湯送下九仙餅治反胃人參南木香不見火南星薑汁洗七次各二錢甘草一錢半夏薑汁洗七次五錢枳殼去瓢麩炒白礬明淨者火枯豆豉煅過各八錢重厚朴薑汁浸炒乾五錢重上等分各製為細末候夜間晴時露過以人參厚朴煎湯糊作餅子太平錢大慢火焙乾每服一餅用姜一大塊切作兩片夾餅子藥用紙裹浸濕慢火煨熟連姜及餅子嚼碎以真料平胃散調湯吞下切忌諸般冷物生物仍令病者寬心開懷服藥調理方見效十三瘡腫門內托千金散治腦背癰疽乳便等惡瘡鄭善明御史救人驗人參當歸黃耆芍藥川芎防風甘草栝蔞白芷官桂桔梗以上各三錢金銀花三錢上為㕮咀每服須稱藥七八錢重水二大盞煎至七分入酒半盞去滓溫服如痛甚者倍加當歸芍藥或加乳香二錢日進三服兩服之後瘡口內有黑血出者或遍身汗出皆藥之功效也如病勢猛惡須稱藥一兩水一大碗煎服未成膿者自散已成者不用針砭自透此藥纍經功效不可不傳普救衆苦搜膿散瘡內有膿不能自出如是透深者用紙拈蘸藥於瘡口內白芍藥三錢川芎一兩香白芷一兩輕粉三錢上為細末瘡平者摻藥在上生肌散治瘡口不合沒藥一錢黃丹一錢水飛過用赤蘞一錢枯白礬一錢白膠二錢黃柏一錢乳香一錢麝香二錢半上為細末先煎蔥白鹽湯洗淨搵干敷藥末於瘡口上白芷散治身上諸般惡瘡及小兒耳項頭疼斑蝥五個蟬殼五個輕粉一錢檳榔三個香白芷二錢蛇床子二錢硫黃二錢樟腦二錢上為細末羅過卻入輕粉再研極細用香油調藥搽敷立效桃花散治諸瘡不合生肌散赤蘞炒白蘞炒黃柏炒以上各三錢輕粉一錢上為細末用蔥白漿水淨洗上藥拔毒散敷貼諸般惡瘡大黃東牆上土上為極細末用無根井花水調搽如干再搽經宿即愈破棺丹治消疔黃走胤不止史相方赤芍藥二兩當歸二兩山梔子二兩半甘草牽牛頭末一兩半大黃三兩半牡蠣炮一兩半金銀花一兩半京三稜一兩切片焙乾上為細末煉蜜為丸如彈子大每服一丸食前用童子小便化開服之病重者服一丸半忌酒生硬物防風當歸散治諸般瘡癤等毒熱瘡防風半兩甘草節半兩赤芍藥半兩綿黃耆半兩當歸半兩白芷半兩左纏藤皂角刺肉桂陰證用半兩陽證用一錢大黃陽證用半兩陰證用一錢上為㕮咀水四碗砂瓶內煎至二碗入好酒一碗再煎至二碗放溫作數起服內皂角刺左纏藤加衆藥五倍返魂丹治十三種疔瘡硃砂膽礬各一兩半血竭銅緑蝸牛各一兩生用雄黃白礬枯各二兩輕粉沒藥蟾酥各半兩麝香少許上將七味為末和搗蝸牛蟾酥極爛和藥時旋入藥為丸如雞頭大每服一丸令病人先嚼蔥白三寸吐在手心內將藥丸裹在蔥白內用熱酒一盞吞下如重車行五里許有汗出即瘥如不能嚼蔥研爛裹藥下曾有一僧貨此藥極有效豫自合救人纍獲效驗真妙方也青露散治背疽一切惡瘡圍藥不胤開白芨白蘞白薇白芷白蘚皮朴硝青黛黃柏大黃天花粉青露散即芙蓉葉老龍皮即老松樹皮上件各等分為細末用生薑自然汁調圍敷如干時再用薑汁潤吸筒以慈竹為之削去青五倍子多用白礬少用些子上二味和筒煮了收起用時再於沸湯煮令熱以筋箕筒乘熱安於患處保生錠子治疔瘡金腳信二錢好雄黃二錢硇砂三錢輕粉半釐麝香一錢巴豆四十九個用文武火炮熱去皮殼上為細末用黃臘一兩溶開和藥成錠子水浸少時取出用藥時旋捏餅子如錢眼大將疔瘡用羊骨針撥開安藥在瘡口內以膏藥貼之無膏藥麵糊貼金砂散治疔瘡硇砂好者雄黃好者上等分研細將生蜜就於角盒子內收貯遇患先用銀篦兒挑破瘡口擠出惡血然後用藥一豆大安入瘡口內用紙花貼即效毒氣入腹多嘔吐欲死者即服後內托香粉散內托香粉散滴乳半兩另研真緑豆粉一兩上為細末煎生甘草湯調三錢時時飲之常令灌潤胸膈栝蔞散治便癰等惡瘡栝蔞一個去皮生薑半兩甘草半兩金銀花三錢牛蒡子三錢微炒上將藥不犯銅鐵器捶碎用酒一大升煎數沸空心溫服微利為度二烏散治發背蜂窩疔瘡便毒等證川烏頭一個草烏頭一個上將新瓦一個汲新水一桶將川烏頭草烏頭並瓦俱浸於水桶內如無新瓦於房上取淨瓦亦可候透瓦將川烏草烏