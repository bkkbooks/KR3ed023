二心氣痛門治急心疼方斑蝥七個頭翅全胡椒四十九粒上將二味同炒令斑蝥焦碎吹去斑蝥不用淨吹鬍椒無斑蝥末將胡椒碾為細末只作一服熱酒調服不拘時候沒藥玄胡散治男子婦人急心氣腹痛玄胡索海帶各五錢沒藥四錢良薑三錢上為細末每服三錢溫酒調服不拘時候治急心氣疼海上方急救男子婦人心疼禁了牙關欲死者可急救之隔年老蔥白上將老蔥白三五根去皮須葉擂為膏將病人口斡開用銀銅匙將蔥膏送入咽喉中用香油四兩灌送膏油不可少用但得蔥膏下喉中其人即蘇少時將腹中所停蟲病等物化為黃水微利為佳除根永不再發纍曾救得人效應痛丸治急心氣痛不可忍者好茶末四兩揀乳香二兩上為細末用臘月兔血和丸如雞頭大每服一丸溫醋送下不拘時候蠶砂散治男子婦人心氣痛不可忍者晚蠶砂不拘多少上為細末用滾沸湯泡過濾淨取清水服之立止三小腸疝氣門香蠍散治小腸疝氣陰囊腫痛乳香一錢蠍梢二錢川烏頭去皮生用三錢上為細末每服一錢水一盞煎至七分入鹽少許空心連滓熱服立見效奪命丹治遠年日近小腸疝氣偏墜搐痛臍下脹痛以致悶亂及外腎腫硬日漸滋長陰間濕癢抓之成瘡並皆治之吳茱萸一斤去枝梗淨四兩酒浸四兩醋浸四兩湯浸四兩童子小便浸各一宿焙乾澤瀉一兩去灰土上為細末酒糊為丸如梧桐子大每服五十丸空心鹽酒或鹽湯下玉蟾裩附煮裩藥三歲嬰孩性不調休教二子放疏嬌一張衲被幪頭了自有神仙路一條煮裩藥山茱萸吳茱萸蛇床子牡蠣川椒蔥白帶須上各等分為㕮咀每用三錢熬水熏洗川楝茴香散治小腸疝氣疼痛木香茴香鹽炒香不用鹽川楝子切片鹽炒同鹽用上各等分為細末每服三錢熱酒一盞空心調服神效丸治疝氣奔豚嬰兒祕訣疝氣因何得邪風在腎經流傳並血聚如此漸成形冷氣積在臟因茲小腹疼本經無補法疏利藥通靈芫花半兩醋浸炒木香檳榔三稜各半兩炒茯苓青皮全蠍附子炮硇砂桂各二錢半上將硇砂用水浸瓷盞內沉去泥土留湯瓶頭頓成膏子糠醋打糊為丸如緑豆子每服三十丸空心溫酒送下喝起丸治小腸氣及腰痛萆薢杜仲酥炒去絲葫蘆巴生芝麻炒破故紙炒小茴香以上各一兩鹽水浸一宿胡桃仁一兩湯去皮上將胡桃為末同前五味藥末為丸如梧桐子大每服三五十丸空心鹽酒送下或鹽湯亦可飛黃丹治小腸疝氣疼痛彭文恕外郎傳得效海上方用帶毛雀兒去腸肚將金絲礬細研裝於雀兒肚內滿縫合用桑柴火緩緩煨燒成灰研為細末空心用無灰酒調下恐噁心入鹽少許年遠者每服二枚近則一枚纍有效驗木香楝子散治小腸疝氣膀胱偏墜久患藥不效者服此藥其效如神燕同知祕傳川楝子二十個為末未碾前先同巴豆二十粒同楝子炒黃赤色去巴豆不用萆薢半兩石菖蒲一兩炒青木香一兩炒荔枝核二十個炒上為細末每服二錢重入麝香少許空心炒茴香鹽酒調下通氣散治小腸疝氣腰腹牽引疼痛及感風寒或因勞動腰痛並治婦人吹奶心氣脾痛瘡癤已潰未潰悉治有功穿山甲銼碎用蛤粉炒脹去粉二兩重白牽牛一兩炒玄胡索去皮一兩陳皮去白淨一兩炒木香一兩半不見火舶上硫黃二兩炒厚朴去皮一兩甘草一兩炒黑牽牛半兩炒上為細末每服二錢空心溫酒調下病在上者食後木賊散治小腸疝氣木賊不拘多少去節先將鍋子燒熱取離火炒上碾為細末空心熱酒調下四聖散治小腸膀胱疝氣疼不可忍者川楝子炒黃胡椒茴香炒全蠍炒以上各半兩上為細末每服二錢空心熱酒調下香砂丸烈平章服得效茴香鹽炒香去鹽不用新蠶砂曬乾上等分為細末煉蜜為丸如彈子大空心細嚼溫酒送下甚者日進二服安息香丸治陰氣下墜腫脹卵核偏大堅硬如石痛不能忍者玄胡索微炒去殼海藻洗昆布洗青皮去白茴香炒川楝子去核馬藺花以上各一兩炒木香半兩不見火大戟酒浸三宿切片焙乾稱二錢半上為細末另將硇砂真阿魏真安息香三味各二錢半用酒一盞醋一盞將硇砂阿魏安息香淘去沙石用酒醋各一盞熬成膏子再入麝香一錢沒藥二錢半俱各另研細入前藥一同和丸如緑豆大每服一十丸至十五丸空心用綿子灰調酒送下治疝氣驗過如神川楝子一兩八角茴香一兩舶上茴香五錢其狀如葵花子真也味如茴香吳茱萸一兩赤白芍藥各五錢川芎枳實麩炒川歸各一兩人參木香各二錢粉草三錢炙上水二鍾生薑三片蔥六莖煎至八分溫服每服一兩仍以草烘熱包裹子袋頻易第二服加枳殼如氣虛加黃耆破故紙第三服加蓬朮第四服加蒼朮為君少用蓬朮四積滯門松煙餅子治積氣塊消食快氣細墨五分燒研陳皮五錢去白牽牛五錢別碾取頭末五錢神麯炒三稜火煨密陀僧研五靈脂研硇砂研牡蠣火煨煅麥糵炒各五錢大黃一兩北棗一十四個燒存性斑蝥一兩去翅足糯米同炒芫花醋浸一宿炒乾漆炒去煙白丁香研大戟去蘆青礞石研蓬莪朮各一錢煨巴豆一兩去皮濕紙裹燒黃色為度上為細末水打麵糊為丸如皂角子大捻為餅子記以所傷煎湯送下或麵湯亦可小兒三餅大人看虛實稟氣加四五餅不嚼吞服其積塊漸漸近下再進一服又覺近下或積塊疪血痢塞大人小兒久痢或休息痢並男子婦人年深不伏水土及暑月變成惡痢米物不消五痞塊逆鬲胃吐食心胸悶閉酒疸食黃勞嗽上喘嘔逆涎沫心閉驚恐口苦噁心小便淋澀大便不通傷寒餘毒婦人胎前産後敗血困生結成積塊飲食平常遍身疼痛腰強腿硬手足眩厥九種心疼十般積熱九般水氣霍亂吐瀉久病瘦弱但有此症並皆治之木香順氣丸消食快氣美進飲食豫亦曾服史才用提舉傳此方當歸去蘆木香獨活去蘆牛膝酒浸三日去蘆防風各一兩去蘆大黃五兩半熟半生檳榔一兩五錢麻仁三兩別研車前子郁李仁各二兩五錢湯浸去皮枳殼煨去穰菟絲子酒浸三日乾山藥各二兩山茱萸二兩去核用一兩上為細末煉蜜為丸如梧桐子大每服三五十丸食後溫湯送下沉香降氣丸治胸膈痞滿升降水火調順陰陽和中益氣推陳致新進美飲食沉香鎊木香蓽澄茄枳殼去穰縮砂仁白豆蔻仁青皮去白陳皮去白廣朮炮枳實麩炒黃連去須半夏薑製蘿蔔子另研以上各半兩白茯苓去皮一兩香附子二兩炒去皮毛白朮一兩煨烏藥一兩半上為細末生薑自然汁浸蒸餅為丸如梧桐子大每服五七十丸臨睡煎橘皮湯送下薑湯亦可日進一服忌生冷調飲食節陰陽金露丸治腹內積聚症塊久患大如杯及黃瘦宿水朝暮咳嗽年深治下冷氣時時腹痛如蟲咬胸心及兩脅徹背疼痛不息氣繞臍下肚疼又治十種水氣反胃吐食嘔逆氣噎五痔走疰風有似蟲行手足煩熱夜臥不安睡語無度治小兒驚疳婦人五邪夢與鬼交沉重不思飲食昏迷不省人事欲死懼多或歌或哭月水不調身體羸瘦但服此藥萬無一失無病不治其效不能盡述草烏頭泡二兩黃連二兩桂心不見火乾薑桔梗茯苓去皮柴胡去苗蜀椒去目炒出汗吳茱萸湯泡七次厚朴薑製人參去蘆菖蒲米泔浸一宿防風紫菀去芮鱉甲醋炙芎藭洗焙枳殼麩炒去穰貝母去心甘遂泡乾地黃洗焙甘草炙以上各一兩巴豆去心膜用醋煮三十沸焙乾一兩不去油上為細末麵糊為丸如梧桐子大每服三丸五丸七丸止胸中痰患米湯送下心疼酸石榴皮煎湯送下口瘡蜜湯送下傷寒麻黃蔥湯送下頭疼石膏煎湯送下蔥茶亦可脾胃氣橘皮湯送下腳氣水氣杏仁煎湯送下水瀉氣瀉草龍膽煎湯送下赤痢甘草湯送下白痢乾薑湯下赤白甘草乾薑湯下胸膈困悶通草煎湯送下婦人氣血痛當歸酒或當歸湯送下風氣小腸疝氣下墜附子煎湯送下傷冷腹痛酒食所傷酒疸黃疸結氣痞塞鶴膝風並鹽湯送下常服米飲白湯茶酒皆可送下此藥前人用之效者馬遂臨老渾身楚痛不思飲食每夜五丸服至七日血塊如雞肝二百餘片水一升以此見效三原主簿陳勝妻病一十五年羸瘦腹痛不可忍服至旬日取下青蟲六七十條如箸頭及藥水四五升似此效不一也進此方時後代鄭授之此方於杜相府子弟用之無不治效如小兒服一丸分作四丸量兒大小下臨合藥時將巴豆必要親自數三十沸便須取出焙乾煎過恐藥無力服藥百無所忌只定看驗病症不定用湯有瘥其效驗不速也丁香爛飯丸治中脘胃痛消食快氣丁香京三稜炮木香廣朮各一錢炮縮砂仁益智仁丁皮甘松去土各三錢甘草二錢炙香附子五錢炒去毛上為細末蒸餅水浸去皮為丸如梧桐子大每服三五十丸白湯送下細嚼亦可不拘時候香稜丸消食快氣寬中利膈化痰小大哥副使常服京三稜廣朮青皮陳皮各銼碎醋煮焙乾蘿蔔子炒別研縮砂仁白豆蔻仁沉香木香半夏曲各一兩炒神麯炒麥糵炒另研以上各一兩阿魏半兩另研香附子炒去毛烏藥枳殼麩炒去穰蓽澄茄檳榔溫姜各半兩上件為細末以神麯麥糵末打糊研入阿魏搜和為丸如梧桐子大每服七八十丸薑湯下不拘時候七香丸治酒食過傷停飲消積寬胸膈快脾丁香乳香研木香麝香研安息香研沉香鎊藿香各二錢半青橘皮去穰陳皮去白檳榔麵裹煨訶子皮京三稜麵煨蓬莪朮煨肉豆蔻麵煨各一兩桂二兩半去皮豬牙皂角一兩去皮弦巴豆七錢去殼不去油別研入細墨半兩上用陳米四兩與皂角墨巴豆一處炒令焦黃用重紙裹候冷同前藥研為細末白麵糊為丸如黃米殼大每服五七丸至十丸食後薑湯送下如欲推利服一十五丸利三二行勿多服丸數香棗丸治蠱氣病蠱有十種苦丁香上為細末用熟棗肉為丸如梧桐子大每服三十九丸煎棗湯送下空心服之立效三服必愈木香三稜散治腹中有蟲面色萎黃一切積滯黑三稜半生半炒多用大腹子多用檳榔雷丸錫灰醋炒三稜煨蓬朮煨木香大黃以上各一兩上為細末每服三錢空心用蜜水調下或沙糖水亦可須先將燒肉一片口中嚼之休咽下吐出口中肉汁後服藥萬靈丸取蟲宣積浙東傳得效黑牽牛一斤取頭末一十兩生用大腹子一斤扁者取七兩末生用如尖者是檳榔京三稜五兩炮廣木香五兩麵裹煨乾為度雷丸五兩炮蓬莪朮煨三兩上為細末和勻用好紫色皂角半斤去皮弦切碎用水兩大碗浸一宿冬月兩宿撈去粗滓銅瓷器內熬數沸白沫出為度放冷和藥必須揉杵搗丸梧桐子大每服四錢重五更用沙糖水送下溫冷不妨至天明去利四五行者看取下是何蟲積以溫白粥補之忌生冷腥硬之物大有神效孕婦勿服消痞丸治痢後肚腹滿悶蒼朮四兩淨米泔浸焙乾炒陳皮一兩去白青皮一兩淨去穰木香二錢上為細末醋糊為丸如梧桐子大每服二十丸空心溫酒下小兒三五七丸米飲湯送下木香枳殼丸寬胸膈進飲食消食快氣木香檳榔陳皮去白黃連去須廣朮煨當歸去蘆枳殼去穰麩炒青皮以上各半兩黃柏香附子麩炒去毛各一兩半牽牛頭末二兩上為細末滴水為丸如梧桐子大每服五七十丸食後薑湯送下若有瘡毒急服百丸至二百丸看人虛實加減服但利五七行立消腫毒木香檳榔丸木香檳榔黃連去須當歸枳殼去穰火煨青皮去穰陳皮各一兩去白大黃四兩紙裹酒浸濕黃芩二兩去黑心黃柏三兩去粗皮牽牛四兩取頭末二兩香附子炒去毛二兩廣朮火煨去穰一兩上為細末滴水為丸如梧桐子大每服五七十丸食後薑湯送下勝紅丸治心腹痞滿消食快氣美進飲食三稜醋炙廣朮醋炙青皮去穰炒陳皮去白乾薑火炮良薑枳實去穰炒白朮煨蘿蔔子炒別研各一兩香附子二兩炒去毛上為細末醋糊為丸如梧桐子大每服五七十丸薑湯或木香同煎陳皮湯送下不拘時候導水丸黃芩二兩去粗皮大黃二兩去粗皮酒浸二三時紙裹火煨滑石四兩碾細飛去灰石牽牛四兩其治法正用一斤炒香取頭末四兩上為細末滴水為丸如梧桐子大每服五七十丸臨臥溫水送下如加黃連薄荷葉以芎各二錢半即神芎丸是也詳證加後藥甘遂一兩久雨則加除濕熱腰痛泄水濕腫白芥子一兩除遍身走注疼痛朴硝退熱散腫止痛久旱則加郁李仁散滯結通關節行腸胃通滯樟柳根去腰腿沉重以上各一兩木香枳殼丸治中焦氣澀胸膈痞滿飲食遲化四肢困倦嘔吐噁心常服升降滯氣消化宿食去痰進飲食木香枳殼去穰炒檳榔半夏湯泡七次青皮去穰陳皮去白白茯苓去皮以上各一兩白朮煨一兩半京三稜煨廣朮煨各三兩二錢黑牽牛微炒取末三兩加人參神麯微炒大麥糵微炒枳實炒各半兩乾薑炮七錢上各依等分同為細末水糊為丸如梧桐子大每服五十丸食後溫薑湯送下五痰飲門化痰丸快脾順氣化痰消食半夏洗南星去皮膜白礬皂角切碎生薑上件各一斤重用水同煮至南星無白點為度揀去皂角不用生薑切作片同半夏南星曬乾無日色火焙再加青皮去穰陳皮去白紫蘇子炒蘿蔔子炒別研杏仁去皮尖炒另研乾葛神麯炒麥糵炒糖球子香附子去毛上件以上半斤淨與前藥合和一處研為細末生薑自然汁浸蒸餅打糊為丸如梧桐子大每服五七十丸臨睡食後茶酒送下神仙墜痰丸治痰壅胸痞氣湊此藥下痰史府判驗黑牽牛一斤取頭末四兩皂角無蟲蛀者去皮弦酥炙黃色去子淨一兩六錢生白礬一兩二錢上為細末清水為丸如梧桐子大每服三五十丸漸加至百丸空心溫酒送下看病輕重五日十日一服病輕者半月一服久服永無癱瘓之疾寬中祛痰丸治男子婦人飲食過多色欲太過食喜酸鹹作成痰飲於胸膈滿則嘔逆噁心流則臂膊大痛升則頭目昏眩降則腰腳重痛沉則左癱右瘓輕則猛然倒地此藥寬中理氣祛痰搜風半夏四兩湯泡七次曬乾研為末用生薑自然汁捏作餅子陰乾荊芥穗一兩白礬枯一兩麻黃四兩去節淨用槐角子一兩麩炒陳皮湯洗去白一兩硃砂一兩研細水飛過半入藥一半為衣上為細末生薑自然汁打糊為丸如梧桐子大每服三十丸空心臨臥用皂角子仁炒黃同生姜煎湯送下忌食豬羊血豬肉桑鵝蘑菰黃瓜茄子等物二陳湯治痰飲為患或嘔吐噁心或頭眩心悸或中脘不快或發寒熱或因食生冷半夏湯泡七次橘紅去白各五兩甘草一兩半炒白茯苓去黑皮三兩上為㕮咀每服四錢水一盞半生薑七片烏梅一個煎至六分去滓熱服每服加竹茹如卵許大一塊同煎食前服滌痰丸治男子婦人遠年日久積聚痰涎或飲酒食後吐唾日久面黃肌瘦皮肉枯澀眼無神光又治偏正頭風如一月服三五服至老無風癱之疾鎮江太平宣差傳好皂角不要蟲蛀損者一十兩水浸一宿去皮弦火炙黃色取淨末二兩五錢豬牙皂角一兩依皂角製法枳殼二兩五錢一兩半火炒一兩生用黑牽牛二兩末上件用朴硝五錢井花水泡開不用滓末澄清硝水為丸如梧桐子大每服五十丸臨臥用井花水送下量人虛實加減丸數服之控涎丹治胸膈背項腰胯手腳隱痛筋骨牽引釣疼坐臥不能走注不定俗醫不曉便用風藥及針灸無效又疑是風毒結聚以藥敷貼亦非也此乃痰涎積在胸膈或令人頭痛不可舉或神志昏鈍多睡或飲食無味痰唾稠黏多流睡涎手腳沉重痹氣不通以為癱瘓亦非也但有此疾服此藥不數服即安建德察罕方戶傳甘遂去心紫大戟去皮白芥子真者各等分上為細末煮粥為丸如梧桐子大曬乾食後臨臥每服五七丸至十丸淡薑湯送下如痰猛氣實加丸數不妨半夏湯順陰陽消痞滿消酒化痰半夏薑製橘紅去白桔梗炒去蘆各一兩枳實炒半兩去穰上為㕮咀每服四錢水一盞半生薑五片煎至七分去滓半飢半飽熱服敵痰丸治痰盛寬胸膈快氣完顏府判傳黑牽牛三兩皂角二兩去皮弦火中微燒白礬枯一兩半夏曲炒一兩陳皮去白一兩上為細末煮蘿蔔為丸如梧桐子大每服四五十丸臨臥淡薑湯送下化痰丸治頑痰不化石青一兩水飛石碌半兩水飛上為末曲糊為丸如緑豆大每服一十丸溫湯下有痰即吐去一二碗不損人生胃丸治脾胃不足痰多嘔逆不思飲食此藥以南星粟米黃土為主蓋謂南星醒脾去痰粟養胃黃土取其以土養土性味溫平美進飲食化痰之要劑真良方也大天南星四兩用真黃土半斤將生薑滓和黃土成劑包裹南星慢火煨香透去土不用將南星切碎焙乾丁香木香厚朴去皮薑製炒神麯炒麥糵炒橘紅白豆蔻仁縮砂仁青皮去白各一兩半夏曲二兩人參半兩沉香鎊半兩粟米一升生薑二斤和皮擂碎取自然汁浸粟米蒸焙甘草半兩炙上為細末法丸如緑豆大每服七十丸不拘時薑湯送下來蘇膏治遠年日近風癇心恙風狂中風涎沫潮閉牙關不開破傷風搐並皆治之皂角一斤用好肥者無蟲蛀去皮弦上將皂角去皮弦切碎用酸漿水一大碗春秋三四日冬浸七日夏浸一二日揉取淨漿水浸透皂角汁入銀器或沙鍋以文武慢火熬用新柳條槐枝攪熬似膏藥取出攤於夾紙上陰乾收頓如遇病人取手掌大一片用溫漿水化在盞內用竹筒兒盛藥水將病人扶坐定頭微抬起將藥吹入左右鼻孔內良久扶起涎出為驗欲要涎止將溫鹽湯令病人服一二口便止忌雞魚生硬濕面等物神聖餅子治痰及一切頭風豬牙皂角炮存性淨末一錢玄胡索一錢淨末青黛研半錢上為細末滴水為丸如梧桐子大捏作餅子曬乾每用一餅新水化開男左女右仰面用蘆筒鼻內灌之口咬銅鐵一十五文其涎便出頭風更不再發六喘嗽門人參胡桃湯治胸滿喘急不能睡臥老人宜服人參胡桃五個取肉與參等分上件作一服用水一盞生薑五片煎至七分去滓臨臥溫服杏仁煎治老人久患肺喘咳嗽不已睡臥不得服之立定杏仁去皮尖胡桃肉上各等分研為膏入煉蜜少許和搜得宜丸如大彈子大每服一二丸食後臨臥細嚼薑湯送下祛痰丸治風痰喘嗽人參木香天麻白朮煨茯苓青皮去穰陳皮去白以上各一兩槐角子半夏各七分半豬牙皂角去皮弦酥炙五錢上為細末生薑自然汁打糊為丸如梧桐子大每服五七十丸食後臨臥溫酒送下薑湯亦可殭蠶湯治喘嗽喉中如鋸不能睡臥好末茶一兩白殭蠶一兩上為細末放碗內用盞蓋定傾沸湯一小盞臨臥再添湯點服七羡補門沉麝香茸丸治五勞百損諸虛精怯元氣不固沉香二錢麝香一錢南木香乳香各三錢八角茴香四錢小茴香四錢炒鹿茸酥炙蓮肉炒各半兩晚蠶砂蓯蓉菟絲子牛膝川楝子用酒浸各半兩地龍去土淨半兩陳皮半兩去白仙靈脾三錢酥炙上一十六味依分兩制和為細末酒糊入麝香為丸如梧桐子大每朝不見紅日面東用溫酒送下三十丸忌食豬羊肉豆粉之物蒼朮丸治腰腿疼痛明目暖水臟並小腸疝氣大有補益蒼朮一斤用泔浸去皮切作片用生蔥白一斤切碎加鹽二兩同炒蒼朮黃色為度去蔥不用川椒微炒白茯苓去皮小茴香微炒各四兩上件為細末酒糊為丸如梧桐子大每服五七十丸空心溫酒送下十寶丸專補益肝脾腎三經其功不可具述破故紙酒浸一宿焙乾附子炮去皮臍稱蒼朮銼泔浸一宿焙乾當歸去蘆焙各一兩石棗半兩去核枸杞子焙半兩菟絲子酒浸焙乾蓯蓉酒浸焙乾白茯苓去皮各半兩地黃去蘆揀肥壯者酒浸蒸焙乾如此九次透黑為度仔細制全在此一味焙乾二兩上為細末醋糊為丸如梧桐子大每服三五十丸空心用溫酒或鹽湯送下乾物壓之琥珀丸治虛損降心火益腎水興陽道琥珀明者沉香木香丁香淨小茴香鹽炒白茯苓去皮陳皮去白八角茴香熟地黃甘草炒各五錢木通去皮沒藥枳殼炒各三錢當歸三兩炒上為細末煉蜜為丸如彈子大每服一丸空心細嚼酒送下日進二服滋補丸治下元虛弱白芍藥二兩人參一兩白茯苓去皮阿膠銼碎麵炒當歸地黃生熟皆可半夏生用鹿茸鹽炙黃耆鹽炙五味子以上各一兩上為細末酒糊為丸如梧桐子大每服七十丸空心溫酒送下宜常服補益丸補益腎水明目及腰膝痛小茴香一兩鹽炒木香一兩川楝子春秋二兩夏一兩冬三兩取肉酒浸知母春秋二兩夏一兩冬三兩酒浸枳殼去穰一兩麩炒白茯苓甘草炙地龍炒鹿茸酒炙穿山甲各一兩酥炙狗莖五枚酥炙上為細末煉蜜為丸如彈子大每服一丸空心細嚼溫酒送下乾物壓之午食前再進一服萬安丸治下元極虛更進飲食肉蓯蓉四兩酒浸干薯蕷五味子各二兩半杜仲三兩炒牛膝酒浸菟絲子酒浸澤瀉白茯苓熟乾地黃當歸山茱萸去核以上各二錢巴戟三兩去心赤茯苓去皮上為細末用蓯蓉末半斤酒煮膏和為丸空心溫酒送下忌醋陳自死之物十補丸治陰損久虛下冷夜頻起暖丹田肉蓯蓉酒浸菟絲子酒浸牛膝酒浸乾山藥熟地黃川烏頭澤瀉人參當歸官桂不見火上件各等分為細末酒糊為丸如梧桐子大每服五十丸空心溫酒送下四倍丸治腰膝疼痛美進飲食杜仲四兩瓦器炒黃色去絲破故紙四兩瓦器內炒黃色甘草四兩胡桃仁四兩去皮油上為細末酒糊為丸如梧桐子大每服五七十丸空心用甘草末調湯送下萬安丸川楝子半斤微炒出汗知母半斤微炒出汗甘草四兩微炒茴香四兩炒蓮子心木香各一兩晚蠶砂一兩微炒上件除甘草茴香八味先搗為末存留四兩熬膏子外將余上四兩與其餘藥一處為末用膏子為丸如梧桐子大每服七八十丸空心溫酒送下騙馬丹治寒濕腳氣四肢疼痛補五臟壯筋骨補精髓注顏黑髮鬢行步健大宜常服葫蘆巴鹽炒黃色破故紙鹽炒香金剛骨酒浸一宿曬鹽炒骨碎補去毛鹽炒甜瓜子鹽炒黃色胡桃仁另研細以上各一兩乳香另研沒藥另研自然銅火煅醋蘸七次以上各半兩上除另研外為細末醋糊為丸如梧桐子大每服三十丸溫酒送下病在上食後病在下食前日進三服四神丸治腎經虛損眼目昏花補虛益損及兩眼雲翳遮睛甘州杞子一斤揀去白醭青焦者分作四份一份四兩川椒一兩炒一份四兩用小茴香一兩炒一份四兩用鹽炒一份四兩用芝麻一合炒比及炒時先用好酒一盞將枸杞子潤過不然恐炒過藥性也上件炒過將川椒等四味篩去不用止用枸杞子加熟地黃白朮白茯苓各一兩同枸杞子為細末煉蜜為丸如梧桐子大每服五七十丸空心溫酒送下加甘菊花一兩炒柴胡梅連散治骨蒸勞久而不痊三服除根其效如神及五勞七傷虛弱並皆治之胡黃連柴胡前胡烏梅以上各三錢上為㕮咀每服三錢童子小便一盞豬膽一枚豬脊髓一條韭根白半錢同煎至七分去滓溫服不拘時候金鎖正元丹治男子五勞七傷沉寒痼冷四肢厥逆陰盛身寒臍腹久痛臟腑軟弱困倦少力飲食遲化澀精補氣久服強健注顏白殭蠶炒破故紙炒白龍骨山茱萸湯浸去核桑螵蛸炒黑附子炮肉蓯蓉酒浸牛膝酒浸菟絲子酒浸以上各半兩韭子二兩炒上為細末煉蜜為丸如梧桐子大每服二三十丸空心溫酒送下日進三服常服有益婦人亦可服人參固本丸一名二黃丸夫人心主血血生氣氣生精精盛則髭發不白顏貌不衰延年益壽其夭闕者多由服性熱之藥不能滋生精血也而藥之滋補者無出生熟二地黃與天麥二門冬人徒知服二地黃而不知服二門冬為引也蓋生地黃能生精血天門冬引入所生之地熟地黃能補精血用麥門冬引入所補之地四味互相該載本草又以人參為通心氣之主五味並歸於心而藥之滋補誠無過也熟地黃洗地黃洗再蒸天門冬去皮麥門冬去心各一兩人參半兩上五味為細末煉蜜為丸如梧桐子大每服五十丸空心溫酒鹽湯送下十日明目二十日不渴自此可致長生也茯苓丹延年益壽黑髭發大有補益白茯苓去粗皮為細末淘碎陰乾四兩頭面十三兩人參末三錢青鹽少許上用滾水和成劑如大道以文武火燒熟驗數分作十日服食一月服三料夏加干蓮子肉一兩余月加乾山藥一兩四炒丸治脾胃虛弱脾土不能化痰成窠鬥停於胸臆飲食既少復遲當以實脾土則痰下氣順肉豆蔻一兩用鹽酒浸破故紙同炒乾燥不用破故紙山藥一兩酒浸與五味子同炒乾燥不用五味子厚朴二兩去粗皮青鹽一兩同炒青鹽不見煙為度不用鹽大半夏一兩每個切作兩塊豬苓亦作片水浸炒燥不用豬苓上為細末酒糊為丸如梧桐子大辰砂一分沉香一分作二次上為衣陰乾每服五七十丸空心鹽酒或米飲湯或鹽湯送下四製蒼朮丸燥脾土固真養胃蒼朮一斤分作四份制一份四兩用破故紙小茴香同炒一份四兩用川楝子同炒一份四兩用川椒同炒一份四兩用青鹽同炒上件同炒畢余藥不用只用蒼朮為末酒糊為丸如梧桐子大每服五十丸空心米飲湯送下駐春丹縮小便美顏色好白茯苓四兩水飛去皮及沙細研為末白麵一斤另傾人參一兩不犯銅鐵捶碎川椒一合以木研碎去目青鹽一匙頭上三味為粗末水二大碗煎至一碗與茯苓白麵和勻如臂大文武火燒熟三日服一料一月服十料半年之後當減三料每月只服七料又半年再減三料每月只服四料若兩日一次見小便方是效也如此更不要常服七仙丹又名枳殼丸治虛損小便頻數健陽木香半兩枳殼一兩麩炒去穰白茯苓去皮川楝子酥炒知母去毛小茴香鹽炒甘草去皮以上各一兩上為細末煉蜜為丸如彈子大每服一丸空心細嚼溫酒送下乾物壓之鐵甕先生交感丹世人中年精耗神衰常言百事心灰蓋緣心血少而火不能下降腎氣憊而水不能上升至心中隔絶榮衛不和所苦者上則心多驚怖中則寒痞飲食減少下則虛冷遺泄甚至陰痿不興臟氣滑泄愚醫徒知峻補下田非惟不能生水滋心而建僞失真立見衰悴夭折之由當自此始悲夫所處此方廣濟迷流然不可忽此藥品志心服之半年漸屏去一切暖藥不可恃此而馳嗜欲然後力習祕固泝流之術其神效不可殫述質之天地切勿亂傳居易之祖俞通奉遺訓豫年五十一歲遇鐵甕申先生授此祕術酷志行侍服一年大補平日所服暖藥一切屏盡而飲食嗜好不減壯歲乃此藥力之功大矣今年八十五享天然之壽瞑目無憾猶此藥耳傳之的普示群生同登壽域藥後有湯及白牙藥可同用茯神四兩香附子一斤碎去毛用新米泔浸一宿炒黃色上為細末煉蜜為丸如彈子大每服一丸空心細嚼用後湯藥送下降氣湯茯神二兩香附子半斤炒浸如前法甘草一兩半炙黃色上為細末每服二錢湯點送交感丹刷牙藥香附子五兩上用生薑三兩研和滓汁浸香附子三宿炒黑存性為末加青鹽二錢拌勻每日刷牙蒼朮散治風濕常服壯筋骨健步蒼朮一斤用粟米泔浸過用竹刀刮去筋皮半斤童子小便浸半斤無灰好酒浸上件春五日夏三日秋七日冬十日取出蒼朮於淨地上撅一坑以炭火煅紅去炭將浸蒼朮酒小便傾於坑內卻放蒼朮於坑內用瓦器蓋覆用泥固封經一宿取出蒼朮為細末每服二錢空心鹽湯或酒調服常服除濕壯筋骨明目心腎丸治水火不既濟恍惚多忘心忪盜汗夜夢驚恐小便白濁精滑夢泄腰膝緩弱四肢痠痛補氣血生津液安神定志此方解宣慰患脫證自泄不止醫不能治服心腎丸博金散金鎖丹此三方得效復以壯年精不自泄三藥互換間服鹿茸一兩酒塗炙附子一兩炮去皮臍牛膝二兩去苗酒浸菟絲子三兩酒浸熟地黃二兩再蒸當歸一兩去蘆酒浸遠志一兩去心甘草水煮蓯蓉二兩酒浸五味子山藥炒龍骨略煅人參去蘆白茯苓去皮黃耆炙以上各一兩上為細末用浸藥酒打糊為丸如梧桐子大每服五七十丸空心棗湯送下博金散治脫證自泄人參一兩去蘆白茯苓二兩去皮絡石二兩龍骨一兩略煅上為細末每服三錢空心米飲湯調服臨臥再一服金鎖丹治男子婦人滑精鬼交遺泄茯神三錢遠志二錢去心五色龍骨三錢煅紅牡蠣四錢左顧者炒赤色堅白茯苓二錢上為細末酒糊為丸如梧桐子大每服三四十丸空心鹽湯或酒送下鎖精丸治滑泄不禁川獨活川續斷穀精草石蓮肉去殼生雞頭去殼蓮心干菱米川楝子酥炒金櫻子緊龍骨五色白茯苓木豬苓小茴香藕節上件各等分為細末雞清為丸如梧桐子大每服四五十丸空心鹽湯送下乾物壓之二聖散治失精漏泄久虛蓮子心一撮辰砂一分上為細末每服二錢空心白湯送下鐵刷湯治男子婦人一切陰寒失精色敗腰膝疼痛陰汗不止腸風下血痔漏有頭者即散有漏平痊兼治婦人赤白帶下産後血暈氣等疾用酸漿水一大碗藥末五錢鹽少許同煎三五十沸傾在盆內熏之漸通手洗浴如火熱婦人每日熏浴之使精穢血如黑汗下用藥人自知紫稍花成塊帶蒂者佳揀肉桂大丁香蛇床子吳茱萸各一兩山茱萸去核天仙子蘿蔔子川椒細辛地豆大者白眉者佳狗脊芎藭甘松各半兩天雄一個白檀槐角子白芷沉香蕓薹子葶藶子香附子芫花巴戟去心肉蓯蓉木香各二錢上件為粗末每煎熏洗代灸膏治老人衰弱元氣虛冷臟腑虛滑腰腳冷痛沉重飲食減少手足逆冷不能忍者用此灸方功效不能盡述大附子一個炮吳茱萸桂皮木香蛇床子各半兩馬藺花一兩焙上為細末每用藥半匙白麵半匙生薑汁半盞同煎成膏攤於紙上臨臥貼臍以油紙覆其上綿衣系之自夜至明乃去每夜如此貼之其腰腹如灸百壯除寒積腰疼貼腰眼補精膏常服壯元陽益精氣助胃潤肺牛