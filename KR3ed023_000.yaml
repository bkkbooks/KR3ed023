front:
  text: 原序曩豫誦范文正公良相良醫之言未嘗不斂衽嘉嘆何則良相輔弼元首治天下興利除害選賢任能使人樂其業而吾仁之見諸事者足以澤被四方良醫導和人身療百病脫疴起痼斡元氣而開壽域使人安其生而吾仁之蘊諸心者亦足以波及萬姓蓋出處之轍雖異而吾仁之用則同君子不可斯須而忘吾仁則吾仁之在天下亦不可勝用矣謙齊先生沙公志文正之所志學文正之所學輕車埋輪繡文直指所至摧奸貪之膽拯生民之命由柏垣而登薇府一以是心民以是厚今為建昌守也殆將小試龔黃事為異日姚宋張本良相之效豈不著哉然公猶以為未盡乃退而考訂名醫方書常經驗者分門別類為一十五卷鋟梓郡庠因目其書曰瑞竹堂經驗方以惠斯世噫如公之仁可謂至矣豫故序諸篇端欲人人之誦此書者不惟知公之心良於醫又當知公之志良於相二者皆自公仁心一點中出王都中序又序人有恆言看方三年無病可治治病三年無藥可療斯言何謂也謂病之有方不難而方之有驗為難也旴江群侯歷仕風憲民社愛人一念隨寓而見有仁心有仁聞人之被其惠澤者奚趐百千萬而蒞官餘暇猶注意於醫藥方書之事每思究病之所由起審藥之所宜用或王公貴人之家或隱逸高人之手所授異方率和劑三因易簡等書之所未載遇有得必謹藏之遇有疾必謹試之屢試屢驗積久彌富守旴之日進一二醫流相與訂正題曰瑞竹堂經驗方爰鋟諸木以博其施一皆愛人之仁所寓也既仁之以善政復仁之以善藥孰有能如侯之仁者哉噫世之醫方甚繁用之輒效者益鮮今之所輯悉已經驗則非其他方書所可同也侯名薩德彌實瑞竹堂者往時侯插竹為樊竹再生根遂生枝葉人以為瑞而侯以扁其堂云臨川吳澄幼清撰
