上二日定四日一換若單用白芷川芎螵蛸三味煎水洗之亦效又方無名異細研清油調搽濕則干敷其上十四婦人門八珍散治月水不調臍腹㽲痛全不思食臟腑怯弱泄瀉小腹堅痛時作寒熱此藥調暢榮衛滋養氣血能補虛損當歸去蘆川芎熟地黃白芍藥人參去蘆甘草炙茯苓去皮白朮以上各一兩上為㕮咀每服三錢水一盞半生薑五片棗一枚煎至七分去滓不拘時候通口服沉香散治婦人一切血氣刺痛不可忍者及男子冷氣痛並皆治之沉香木香當歸白茯苓白芍藥以上各一錢上為㕮咀每服一錢水三盞於銀石器內不用銅鐵器文武火煎數沸入全陳皮一個又煎十數沸入好醋一盞又煎十數沸入乳香沒藥如皂角子大一塊同煎至一盞去滓通口服不拘時候白芷散治婦人難産能救子母性命百草霜一兩香白芷半兩上為細末每服一錢水一盞煎至七分加童子小便稍熱服斗門散治婦人經脈逆行血風攻腦頭目旋悶欲死忽然倒地不省人事喝起草上取其嫩心不以多少陰乾為細末用常酒調服一大盞不拘時候其功最大服之多者連通頂門治婦人吹奶鼠糞五十粒麝香一字上為細末食後用熱酒一盞調服立愈蒲黃散治婦人血山崩纍驗祕方破故紙炒黃蒲黃炒千年石灰炒黃上各等分為細末每服三錢空心用熱酒調服立止又方治婦人血山崩不止婦人油頭髮半兩燒灰千針草灰半兩上為細末每服三錢淋火煅稱槌酒調服血竭散治婦人臍下血積疼痛血竭乳香沒藥並另研水蛭鹽炒煙盡白芍藥當歸麝香以上各一兩虎骨火炙油盡黃一錢六分上為極細末每服三錢空心溫酒調服四制醋附丸治婦人女人經候不調香附子一斤帶毛分作四份一份好酒浸七日一份米醋浸七日一份小便浸七日一份鹽水浸七日各焙乾上為細末醋糊為丸如梧桐子大每服七十丸空心食前溫酒送下肥人只依本方服並無加減瘦人加澤蘭葉赤茯苓各二兩重養氣丹在和劑局方治婦人年未及四十歲天癸斷行每服五丸空心溫酒送下芩心丸治婦人四十九歲以後天癸當住每月卻行或過多不止黃芩心枝條者二兩重用米醋浸七日炙乾又浸又炙如此七次上為細末醋糊為丸如梧桐子大每服七十丸空心溫酒送下日進二服四七湯治婦人女子小便不順甚者陰戶疼痛半夏一兩湯泡七次厚朴薑製赤茯苓各半兩紫蘇葉三錢甘草二錢香附子五錢上為㕮咀分作四服每服水二盞生薑五片煎至七分去滓加琥珀末一錢調服治産後血痢生薑不拘多少切作小棋子片以面拌和捏成毯子慢火炒令焦黃研為細末米飲湯調三錢空心服産後血塊腹痛京芎炒川當歸炒乾地黃洗芍藥以上各半兩蒲黃一分銚內隔紙炒赤上同為細末每服三錢空心溫酒調服産後敗血不止乾地黃石器內搗為末每服二錢食前熱酒調下連進二服硇砂散治胎死腹中不下硇砂細研當歸各一兩上二味當歸極細另研硇砂為細末只分作二次服溫酒調下無時服如重車行五里不下再一服十五小兒門褐子丸治小兒陰陽不和臟腑怯弱乳食不消心腹脹滿嘔逆氣急或腸鳴泄瀉頻並腹中冷痛食症乳癖痃氣痞結積聚腸胃或祕或痢頭面浮腫不思乳食及療五種疳氣八種痢疾肌肉消瘦氣粗腹大神色昏憒情意不樂常服散冷熱氣調和臟腑去疳積止瀉痢進飲食生肌肉悅顏色功效非常不能盡述出活幼口議方蘿蔔子二兩微炒陳皮去白一兩青皮去白一兩黑牽牛一兩半一半生用一半熟京三稜一兩炒蓬莪朮一兩炮胡椒半兩木香一分不見火上為細末水煮麵糊為丸如梧桐子大每服二三十丸空心用蘿蔔子煎湯或薑湯送下看兒大小加減服之長生丸治小兒清上實下補脾治痰出陳文仲方木香半兩檳榔三兩不見火枳殼一兩去穰麵裹煨丁香三錢半夏三錢薑湯泡七次全蠍二十個去毒尖肉豆蔻三錢縮砂三錢上件除肉豆蔻外七味同為細末次入豆蔻再研極細末用飲和為丸如粟米大小兒每服三五十丸空心乳汁飲湯送下服訖候半時方進乳食日進三服吐乳者胃冷宜服此藥大便酸臭是傷食乳食不消是脾虛宜服此藥一捻金散治走馬牙疳不能治者黃丹飛白礬飛青鹽飛草錦燒灰麝香少許上各等分為極細末先用溫鹽漿水洗淨無糨帛搵干貼藥如聖散治小兒口瘡不能吃乳者江子一粒或二粒上研爛不去油入硃砂或黃丹赤土少許剃開小兒囟門貼在囟上如四邊起粟米泡便用溫水洗去藥恐成瘡便用菖蒲水洗便安其效如神十金散治小兒脾及積其效速錦紋大黃不以多少為細末用米醋熬成膏子先用新磚瓦末羅於新磚瓦上將大黃傾於瓦上用伏內日曬夜露干為末舶上硫黃官粉以上各等分上三味為極細末每服米飲湯調下一歲小兒服五分二三歲服一錢十歲以下服二錢十六七歲服五錢一服即效如不愈隔二十日再一服更不須再服切忌生冷濕曲馬驢豬魚雞兔等肉切要忌口如不能忌口枉服此藥豫曾親手救人但能忌口者醫好數人治小兒煉胤瘡方黑驢糞曬乾燒灰清油調搽立效治小兒出瘡疹眼內有云翳方輕粉黃丹各等分上為竹筒吹在耳內左眼有翳吹右耳右眼有翳吹左耳翳即退治小兒丹瘤綿羊腦子生用朴硝上二味調勻貼於瘤上立效神效萬金丹治小兒慢驚風急驚風十無一失硃砂真輕粉上二味不以多少用青蒿內蟲兒取出於淨瓷盞內將硃砂輕粉以蟲汁就成丸如黃米大量兒大小加減服之半歲一歲小兒服一丸二歲服二丸三歲服三丸乳汁送下取蟲時法止於七月初五日取蒿蟲則靈驗萬金丹治小兒急慢驚風亦曾得效無如前方效速硃砂五錢別研麝香二錢半別研真珠錢半白殭蠶十個炒琥珀一錢明者全蠍十個去尾火炙腦子另研犀角鎊干胭脂以上三味不以多少天南星一錢鉤藤五錢巴豆五粒去皮油上為細末用薄荷湯打糊為丸如麻子大一歲小兒服一十八丸看兒大小加減丸數服之急驚煎薄荷湯送下慢驚煎地龍湯送下磨積丸專治小兒疳積泄瀉等疾京三稜蓬莪朮陳皮去白青皮去白神麯炒麥芽子炒川鬱金胡黃連香附子炒去毛與三稜莪朮陳皮青皮五件一處用好米醋煮一晝夜焙乾雷丸白者使君子肉切焙蘆薈以上各等分上為細末米醋糊為丸如豌豆大每服三十丸糯米湯送下茶湯亦可虛弱加木香虛極加附子疳極加癲蚵蚾肉灸小兒脾神法未灸之前先於土田地上畫個十字於十字中心先灸一炷云不灸天神不灸地神只灸脾神灸畢然後灸病兒男左手女右手用竹片四五寸長令小兒搦定舉頭將竹片於中指背下節頭為準比至中節盡處將竹虛折過再比回一般齊折折作如此樣點腰眼下左右隱然有二坑窩處將此樣竹二尖頂一窩穴中尖落處即腰眼也如此比定以上尖為腰眼穴其艾炷驗小兒歲大小病勢輕重加減小者如筯頭大大者如小指尖多者灸四七少者灸三七灸畢男於左腳月宀死上按恐凹之誤中窩穴內拔出火氣小兒三歲以下灸三炷五歲之上灸七炷灸畢將竹杖如上者通長舒直於病兒心坎上邊立直竹片下邊盡處為穴心坎作如此樣心穴亦看小兒大小及病勢輕重輕則灸三炷重則灸二七病發者中病也如不發可用發瘡物令小兒食之即發既發之後卻令忌口十數日瘡愈則有效驗只在十日半月之間進飲食退黃色變容顏取萬全之效吾家之孫賴此法以活餘人愈者亦有之如欲灸時若得知穴法人點定尤佳治小兒大人熱丹瘡成片可取絲茅草葉將丹瘡刮破即愈治走馬牙疳汴梁大紅鞋李提領方小遺盆內白屑取下用瓷罐內盛貯用泥固濟炭火煅紅取出將白屑細研入麝香少許貼於患處大黃膏治小兒大人痹癖大黃朴硝各等分上為細末同蒜泥和成膏用絹帛攤成膏藥貼於病處其脾病自軟消白丁香丸治大人小兒癖積白丁香雀兒糞也黑丁香二錢木香二錢密陀僧三錢硫黃二錢訶子皮輕粉半錢上為細末每服一錢用奶汁調服女兒用男兒奶汁男兒用女兒奶汁調服食前半飢半飽服日進三服用棗兒壓藥大人用米飲湯空心調服葛根麥門冬散治小兒熱毒斑疹頭痛壯熱心神煩悶葛根麥門冬去心各三錢人參去蘆二錢石膏半兩川升麻甘草茯苓各二錢赤芍藥一錢上為粗散每服三錢水一大盞煎至六分去滓溫服不計時候量大小增減服生地黃散治小兒斑駁疹身熱口乾咳嗽心煩生地黃半兩麥門冬去心七錢杏子款冬花陳皮各三錢甘草二錢半炙上為粗散每服三錢水一大盞煎至六分去滓溫服不計時候量大小加減服惺惺散治小兒風熱瘡疹時氣頭痛壯熱目澀多睡咳嗽喘桔梗真細辛去葉人參去蘆甘草炙白茯苓去皮真川芎白朮各一兩上為粗散每服三錢水一大盞薄荷五葉生薑三片同煎至六分濾去滓溫服不拘時候量大小加減服四味升麻葛根湯白芍藥川升麻一兩甘草葛根一兩半上為粗散每服三錢水一大盞煎至六分去滓溫服不計時候木香散瘡疹方治瘡疹瀉利水穀或瀉白色宜煎此藥並下七味肉豆蔻丸治之非虛寒者不可用此急救之劑也木香大腹皮銼細人參去蘆桂心赤茯苓去皮青皮去穰前胡去蘆訶黎勒去核半夏薑製丁香甘草炙各三錢上為粗散每服三錢水一大盞生薑三片同煎至六分去滓空心溫服量大小以意加減異功散木香三錢半官桂二錢去粗皮當歸三錢半人參去蘆二錢半茯苓去皮二錢陳皮厚朴薑製二錢半白朮二錢半夏薑製一錢半丁香肉豆蔻二錢半附子炮去皮一錢半上為粗散每服三錢水一大盞半生薑五片肥棗三枚煎至六分去滓空心溫服三歲兒作三度服五歲兒作二度服一周二歲兒作三五度與服病有大小以意加減此藥家傳五世纍經效驗肉豆蔻丸木香縮砂仁三錢白龍骨半兩訶子肉半兩赤石脂七錢半枯白礬七錢半肉豆蔻半兩上為細末稠麵糊為丸如黍米大一周歲兒每服三五十丸三歲兒服百丸溫米飲下瀉甚者異功散吞下瀉止住服不止多服人參麥門冬散瘡疹方治瘡疹身熱煩渴麥門冬一兩去心人參去蘆甘草炙陳皮白朮厚朴薑製各半兩上為粗散每服三錢水一大盞煎至六分濾去滓溫服不計時候量大小加減與服消毒散牛蒡子四兩炒熱荊芥穗甘草炙各一兩上為粗散每服三錢水一大盞煎至八分去滓溫服不拘時候柴胡麥門冬散瘡疹方治瘡疹壯熱經日不除柴胡二錢半龍膽草一錢一字麥門冬去心三錢甘草炙人參去蘆黑參各一錢半上為粗散每服三錢水一大盞煎至六分去滓溫服不計時候量大小加減瘡疹方熱退住服射干鼠黏子湯瘡疹方治瘡疹壯熱大便堅實或口舌生瘡咽喉腫痛鼠黏子四兩炒香甘草炙升麻射干各一兩上為粗散每服三錢水一大盞煎至六分去滓溫服桔梗甘草防風湯瘡疹方治瘡疹風熱咳嗽咽膈不利桔梗甘草炙防風各等分上為粗散每服三錢水一大盞煎至六分去滓溫服不拘時候量大小加減服人參清膈散瘡疹方治瘡疹涕唾稠黏身熱鼻乾大便如常小便黃赤人參柴胡當歸芍藥知母桑白皮白朮黃耆紫菀地骨皮茯苓甘草桔梗各一兩黃芩半兩石膏滑石各一兩半上為粗末每服三錢水一大盞生薑三片同煎至六分去滓溫服不拘時候量大小加減服前胡枳殼湯瘡疹方治瘡疹痰實壯熱胸中煩悶大便壯實臥則喘急用之屢效前胡一兩枳殼赤茯苓大黃甘草炙以上各半兩上為粗散每服三錢水一大盞煎至六分去滓溫服不拘時候量大小加減如身溫脈微並瀉者不可服雄黃散治小兒因痘瘡牙斷生疳蝕瘡雄黃一錢銅緑二錢上二味同研極細量瘡大小干糝其上麥湯散治水痘地骨皮半分炒麻黃一分去節甘草炙半分人參一分滑石半分大黃一分濕紙煨熟知母羌活各一分甜葶藶一分用隔紙炒上為末每服半錢水一小盞入小麥七粒同煎至十數沸服四聖散治痘疹出不快倒靨或小便赤色餘熱不除紫草木通甘草炒黃耆枳殼去穰上等分㕮咀每服一錢水半盞煎至三分濾去滓溫服不計時候上小兒瘡疹無正方論雖有王談錢氏之書止見其方未見其源療之者往往以藥宣利解散因而耗傷真氣遂至不救者多矣深可痛憫文中今將祖父祕傳方論集為一卷公以刊行蓋守此方三十餘年全活甚衆百不失一合廣其傳使患者無枉夭之禍醫者有活人之功此僕之夙心也
