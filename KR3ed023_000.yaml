body:
  text: 提要臣等謹案瑞竹堂經驗方五卷元沙圖穆蘇原作薩理彌實今改正撰沙圖穆蘇元史無傳其事蹟不可考以吳澄王都中二序核之則其字為謙齊嘗以御史出為建昌太守是書即其在郡時所撰集也原書本十五卷楊士奇等文淵閣書目載有一部一冊而朝瑮寶文堂書目內亦列其名則是明中葉以前原帙尚存其後遂鮮傳本今據永樂大典所載搜採編輯計亡闕已十之五六而所存者尚多謹依方詮次分立二十四門釐為五卷中間如調補一門不輕用金石之藥其處方最為醇正又女科之八珍散即四君子湯四物湯之並方其用尤廣明薛己醫案已詳著之至瘡科所載返魂丹與今世瘍醫所用梅花點舌丹奪命丹相類內托千金散以治癰毒亦見殊功是皆可資利濟之用惟幼科之褐丸子與蘇沈良方中所列褐丸名目相類治療亦同特彼則攻補兼行頗為周密此乃過於峻利蓋金元方劑往往如斯由北人氣稟壯實與南人異治故也此在於隨宜消息不可以成法拘矣乾隆五十年二月恭校上一諸風門勻氣散此方前代曾服有效風藥服之十三日安可治腰腿疼半身不遂手足不能屈伸口眼喎斜風氣中風中氣便用風藥治之十無一愈當以氣藥治之氣順則風散近有人服之見效白朮四兩煨沉香五錢鎊天麻一兩天台烏藥三兩青皮五錢去穰白芷甘草各五錢人參去蘆五錢上為㕮咀每服三錢水一盞半生薑三片紫蘇五葉木瓜三片棗子一枚煎至七分去滓空心溫服麝香散治卒風啞中忽然倒地不省人事左癱右瘓口眼喎斜諸藥未服者服此藥真麝香二錢或三錢研細真香油二三兩上若遇此證急將麝香研細調入清油內攪勻將患人口斡開灌下其人自蘇不惟只治中風又全其後語言不謇手足不癱服此藥後方服順氣疏風之藥為麝香通關余藥可以能行至病所也腦麝祛風丸治左癱右瘓遊平章服此藥得愈最有效驗白花蛇頭一個帶項二寸酒浸炙烏梢蛇尾兩個長七寸酒浸炙川烏頭三個去黑皮附子底四個去黑皮天南星炮半夏薑製白附子細辛去葉防風去蘆天麻全蠍去毒炒白殭蠶去嘴絲炒草烏頭炮以上各半兩腦麝各一分研上為細末薑汁糊為丸如桐子大硃砂為衣每服五十丸煎小續命湯送下不拘時候服聖靈丹治男子婦人風濕相搏氣痹傳於手足麻腫疼痛久則偏枯及腳氣不能行履大治癱瘓風濕手足復舊過兩川烏生去皮臍切片草烏去皮尖切片鹽炒香熟去鹽以上各半兩麻黃去根節微炒去汗生地黃洗去苗銼碎酒浸一宿焙五靈脂揀去砂石微炒不得過火虎脛骨醋浸火炙酥黃色自然銅醋淬七次以上各一兩研廣木香二錢半乳香另研沒藥炙各錢半另研干酸木瓜生者八兩甜瓜子炒黃色一兩沉香五錢鎊敗龜底卜卦者醋炙黃酥七錢半上為細末煉白砂蜜冷定和搜成劑每一兩重分為一十二丸每服二丸隔夜生薑自然汁用瓷盞浸至天明空心化開溫酒調服再飲半盞熱酒送下日進二服唇吻微麻無妨七烏丸治癱瘓風濕寒痹腳疾證張君寶服驗草烏去皮臍生用切作大塊何首烏作大片忌鐵器烏藥細切川烏以上各二兩烏梅五十個捶碎黑豆半斤揀洗淨豬牙皂角二兩去皮弦切作半寸上用無灰酒二升米醋二升同上項藥一處裝於瓷瓶內浸二宿用文武火煮約存一升藥汁取出焙乾為細末仍用藥汁打糊為丸如梧桐子大或藥汁少益以酒醋空心鹽湯下五七十丸腳氣木瓜湯下乾物壓之與活絡丹相間服活絡丹治男子婦人癱瘓筋攣骨痛腰膝疼痛口眼喎斜語言謇澀目晦耳聾頭風等證近用治心氣痛疝尤驗張君寶服驗萆薢二兩金毛狗脊四兩切作片去毛川烏五錢去皮臍切小塊蒼朮五錢去皮切作片炒杜仲五錢細切薑汁浸炒去絲破故紙揀炒仙靈脾切吳茱萸炒續斷各五錢切小茴香炒獨活各一兩切豬牙皂角去皮弦三兩切作一寸薏苡仁三兩上通作一處用好酒三升於瓷瓶內浸一宿次日以文武火煮至約酒汁一升控出焙乾為細末用煮藥酒打麵糊為丸如梧桐子大每服五七十丸空心溫酒或鹽湯送下與七烏丸相間服孕婦不可服此二藥甜瓜子丸治風濕相搏腰腳疼痛服之大效甜瓜子三兩淨炒黃色乾木瓜一兩半去皮穰威靈仙一兩川烏頭半兩炮去皮臍上為細末酒煮麵糊為丸如梧桐子大每服三十丸溫酒送下避風處少息汗出為度服藥後當日忌食熱物及相反藥材與半夏栝蔞貝母白芨之類如病在上食後服如病在下食前服愈風丹治諸般風證偏正頭風通聖散四物湯黃連解毒湯各一兩加後藥羌活細辛甘菊天麻何首烏薄荷獨活以上各一兩上為細末煉蜜為丸如彈子大每服一丸細嚼不拘時候茶酒任下飛步丸治陰陽風濕腳氣手臂舉動不起無問遠近並皆治之紫金皮二斤取頭末八兩揀時嚼如腦子味透頂者方佳又名滑藤根五加皮二兩五錢焙乾肥川烏二兩五錢去皮生用蒼朮二兩五錢米泔水浸一宿焙乾木鱉子仁四兩竹刀切片用三年米醋浸三宿其油已去焙乾上五味為細末醋糊為丸如似兩魚眼睛大每三十至五十丸空心用鹽木瓜少許細嚼和藥無灰酒送下忌動風物復春丸治腰腳風濕勞損手足麻痹筋骨疼痛不能屈伸活血注顏補虛萆薢四兩破故紙炒杜仲炒去絲葫蘆巴炒木通各二兩骨碎補去毛虎骨酥炙乳香研檳榔沒藥木香各一兩半甜瓜子三兩炒牛膝去蘆酒浸焙乾巴戟各二兩去心胡桃仁一百個去皮另研極細上件一十五味為細末與胡桃一處再研極細酒糊為丸如梧桐子大每服四五十丸食前溫酒送下黑弩箭丸治風濕證兩頭尖五靈脂各一兩沒藥另研當歸乳香以上各三錢研上為細末醋糊為丸如梧桐子大每服一十丸至五十丸臨臥溫酒送下忌油膩濕面孕婦勿服紫萍一粒丹治一切風疾纍經效驗天生靈草無根干不在山間不在岸始因飛絮逐東風泛梗青青飄水面神仙一味起沉疴採時須是七月半選甚癱風與大風鐵幞頭上也出汗上採紫背浮萍草攤於竹篩內下著水曬乾為細末煉蜜為丸如彈子大每服一丸用豆淋酒化下及治腳氣打撲傷損渾身麻痹騙馬丹治男子婦人中風口眼喎斜痰涎壅盛語言謇澀手足不仁筋脈拘攣肢體不舉或寒濕相搏肌肉頑麻傳入經絡筋骨疼痛腰腳浮腫難以屈伸或寒濕腳氣或打撲損傷筋骨體骱蹉跌皮膚瘙癢風毒瘡瘍並宜服之成提舉經驗方真川烏二兩炮川芎七錢真蘇木地龍各半兩去土草烏頭炮續斷酒浸白芷牛膝去蘆酒浸肉蓯蓉酒浸滴乳燈芯碾明松香研木鱉子去殼不去油虎脛骨酒浸炙骨碎補酒浸自然銅醋淬七次水飛敗龜板各一兩新瓦煅紅用好醋製淨令黃色全蠍三錢去毒炒上件碾為細末用煮酒打陳米粉為丸如桐子大每服五十丸食後溫酒送下草靈寶丹治一切風疾及風濕走注疼痛口眼喎斜手足頑麻大有神效藥味俱要揀淨然後稱分兩須要精最不可草率川芎枸杞子當歸去蘆淨細辛去苗葉土淨白芍藥荊芥去根淨五加皮去骨淨白蘚皮去骨淨菊花去根梗淨枳殼去穰淨薄荷去根梗威靈仙去土淨木香四兩粉甘草炒淨川附子炮裂去皮臍淨草烏頭炮裂去皮臍淨沒藥研香附子炒去毛淨金毛狗脊炒去毛淨人參去蘆淨地骨皮去骨土淨防風去蘆淨羌活去蘆淨香白芷柴胡去苗土淨升麻去蘆淨麻黃去根節淨烏藥以上各四兩天麻四兩酒浸去苗川楝子去核取肉四兩炒何首烏四兩酒浸白朮去蘆淨四兩煨石斛去根淨四兩炒自然銅四兩煅醋淬七次研水飛車前子四兩酒浸白牽牛四兩炒取末地龍去土淨四兩炒麝香一兩一半為衣研乳香研硃砂二兩為衣研川烏頭炮裂去皮臍淨四兩槐角子四兩炒大黃四兩炒烏鴉二隻臘月者泥固濟炭火煅紅取出用烏梢蛇一條酒浸取肉四兩炙風梢蛇一條酒浸取肉四兩炙白花蛇二條酒浸取肉四兩炙藥末成然後定蜜分兩上件為細末煉蜜為丸如大龍眼大每服一丸空心臨臥細嚼用無灰酒送下芽茶清亦可臘月最可修合換骨丹治卒中風口眼喎斜左癱右瘓不能言用此藥與搐藥不臥散汗出其人必愈有效麻黃五斤去苗根不用節槐角子桑白皮去赤皮仙術香白芷川芎威靈仙人參防風何首烏蔓荊子各二兩苦參木香五味子各一兩麝腦各少許研麻黃用水二十升以槐枝攪成膏子留一升取出和諸藥為丸如彈子大每服一丸用生薑七片帶須蔥頭七莖水一碗煎至半碗先將丸子研細用蔥薑湯熱調服便於暖處厚衣被蓋之勿令透風通身汗出是效也搐藥不臥散藿香石藋花黃者人參藜蘆去苗葉取根芍藥穀精草苦丁香石膏研川芎甘草上十一味停分為細末每用三字口噙水左右鼻內搐之作涕為效與前方換骨丹一對藥如神散治風濕手臂痛左癱右瘓風氣等證真皂角去皮弦八兩海亦兒半兩即合孩兒香茶者是北棗四兩先將皂角熬成清汁濾去滓將棗兒並海亦兒用桑柴文武火熬干取出棗兒瓷器內收頓如熬至七分取汁一盞逐旋添熬干為度每服二三個細嚼咽下後飲酒一盞三四個之上不得多吃木瓜虎骨丸治風寒濕客於營衛合而成痹使肢節疼痛麻痹不仁手臂無力項背拘急腳膝筋攣不能屈伸宜常服木瓜肉麒麟竭另研沒藥另研自然銅煅醋淬七次研木香虎脛骨酒炙黃楓香脂研敗龜板醋炙黃骨碎補去毛甜瓜子官桂去粗皮當歸身銼焙各一兩乳香另研半兩地龍去土稱安息香湯酒煮入藥各二兩上件一十五味除另研外為細末拌勻酒糊為丸如梧桐子大每服二十丸溫酒送下煎木瓜湯送下亦可漸加至五十丸食前臨臥各進一服忌食冷物濕面諸血等物麝香虎骨散治男子因氣虛血弱風毒邪氣乘虛攻注皮膚骨髓之間與氣相搏往來交擊痛無常處遊走不定或日輕夜重筋脈拘急不能伸屈皆治之杭州楊清之教授傳虎脛骨酥炙半兩敗龜板半兩炙麒麟竭研赤芍藥沒藥研自然銅醋炙研白附子炮蒼耳子炒當歸骨碎補去毛防風肉桂去粗皮白芷各一兩牛膝去苗酒浸五加皮川羌活檳榔川天麻各二錢半上件一十八味如修制干入麝香在內為末每服一錢用熱水少許調服空心服之比服此藥之先煎生料五積散三服次日服此藥乳香應痛散治手足麻痹筋骨疼痛補虛注顏蒼朮半斤或四兩制川烏炮草烏各一兩半焙地龍去土半兩五靈脂一兩半去砂石研芍藥葫蘆巴破故紙炒自然銅火煅淬川椒炒出汗茴香炒兩頭尖甜瓜子炒白殭蠶炒白附子當歸牛膝各半兩酒浸乳香沒藥細辛各三錢去葉血竭二錢半研上為細末醋糊為丸如梧桐子大每服五七丸至十丸空心溫酒送下乾物壓之鹽湯亦可薏苡仁湯治手足流注疼痛麻痹不仁難以屈伸薏苡仁去皮一兩當歸去蘆一兩芍藥麻黃去節桂去粗皮各一兩甘草去皮一兩微炒蒼朮去粗皮四兩米泔浸一宿炒上為㕮咀每服五錢水二盞生薑五七片煎至七分去滓食前溫服若病人汗出者減麻黃病人內熱者減桂看虛實加減服之遇仙如意丸治諸風疾病及患惡瘡婦人月事不見産後胸中惡物盡皆治之大有效驗白茯苓去皮陳皮去白青皮去穰各一錢丁香木香人參各二錢白朮煨白豆蔻仁縮砂仁官桂去皮荊三稜炮石菖蒲炒去毛遠志去心廣朮炮各三錢乾山藥半兩甘草去皮少許香附子五兩牽牛頭末將八兩研用頭末一兩六錢上為細末好醋糊為丸如梧桐子大每服一百二十丸看老幼虛實加減丸數臨臥溫水送下凡食不可太飽可食粥五七日忌生冷硬物酒肉魚面若風疾病加地骨皮一兩若氣蠱水蠱每服三百丸一服立消大效此藥微利三五行欲要止臟腑吃涼水一口便住利後服甘